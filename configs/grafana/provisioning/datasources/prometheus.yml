apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://localhost:9090
    access: proxy
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "5s"
  - name: Loki
    type: loki
    uid: loki
    url: http://localhost:3100
    access: proxy
    editable: true
